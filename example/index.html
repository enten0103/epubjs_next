<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EPUB.js Next — Example</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        margin-bottom: 16px;
      }
      .controls {
        margin-bottom: 16px;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .controls button {
        padding: 6px 10px;
      }
      #status {
        color: #666;
        font-size: 14px;
      }
      #book-info {
        margin-bottom: 12px;
        padding: 12px;
        background: #f5f5f5;
        border-radius: 4px;
        display: none;
      }
      #book-info p {
        margin: 4px 0;
      }
      .layout {
        display: flex;
        gap: 16px;
      }
      .toc {
        width: 260px;
        flex-shrink: 0;
        max-height: 80vh;
        overflow-y: auto;
        display: none;
      }
      .toc h3 {
        margin-bottom: 8px;
      }
      .toc ul {
        padding-left: 16px;
        list-style: none;
      }
      .toc li {
        margin: 4px 0;
      }
      .toc a {
        color: #0066cc;
        cursor: pointer;
        text-decoration: none;
        font-size: 14px;
      }
      .toc a:hover {
        text-decoration: underline;
      }
      #container {
        flex: 1;
        border: 1px solid #ddd;
        border-radius: 4px;
        overflow: hidden;
        height: 80vh;
        min-height: 80vh;
        display: none;
      }
      #container iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        color: #999;
        font-size: 18px;
        border: 2px dashed #ddd;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>EPUB.js Next — Example</h1>
    <div class="controls">
      <input type="file" id="file-input" accept=".epub" />
      <button id="prev-xhtml" disabled>Previous XHTML</button>
      <button id="next-xhtml" disabled>Next XHTML</button>
      <span id="status"></span>
    </div>
    <div id="book-info"></div>
    <div class="layout">
      <div id="toc-container" class="toc"></div>
      <div id="container"></div>
      <div id="placeholder" class="placeholder">Select an .epub file to get started</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
